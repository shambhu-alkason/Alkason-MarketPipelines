# ── Stocks ───────────────────────────────────────────────────────────
stocks:
  symbols:
    - INFY.NS
    - IRCTC.NS
    - TATAPOWER.NS
    - TMPV.NS
    - TRIVENI.NS
    - VBL.NS
  period: 5y
  interval: 1d
  provider: yfinance          # OpenBB provider backend

# ── Signal Thresholds ────────────────────────────────────────────────
labels:
  strong_buy_threshold: 0.02      # +2%
  buy_threshold: 0.005            # +0.5%
  sell_threshold: -0.005          # -0.5%
  strong_sell_threshold: -0.02    # -2%

# ── Training ─────────────────────────────────────────────────────────
training:
  test_size: 0.2
  cv_folds: 5
  random_state: 42
  use_smote: true
  optuna_trials: 50
  sequence_length: 20             # LSTM lookback window (trading days)

# ── MLflow ───────────────────────────────────────────────────────────
mlflow:
  tracking_uri: http://localhost:5000
  experiment_name: stock-prediction-2026
  registry_model_name: "{symbol}-stock-predictor"

# ── SLM ──────────────────────────────────────────────────────────────
slm:
  sentiment_model: ProsusAI/finbert
  explainer_model: granite4.1:3b
  ollama_base_url: http://localhost:11434
  watsonx_url: https://us-south.ml.cloud.ibm.com
  news_lookback_days: 7
  max_headlines_per_stock: 20
  cache_news: true

# ── Monitoring ───────────────────────────────────────────────────────
monitoring:
  drift_threshold_psi: 0.2
  drift_threshold_ks_pvalue: 0.05
  drift_check_schedule: "0 2 * * *"    # 2am daily

# ── API ──────────────────────────────────────────────────────────────
api:
  host: 0.0.0.0
  port: 8000
  reload: false

# ── Paths ────────────────────────────────────────────────────────────
paths:
  raw_data: data/raw
  processed_data: data/processed
  news_cache: data/news
  manual_models: models/manual
  mlflow_models: models/mlflow
  reports: reports
